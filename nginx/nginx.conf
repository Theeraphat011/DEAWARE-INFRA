events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Fix Origin:null that browsers send when behind reverse proxy
    map $http_origin $fixed_origin {
        default $http_origin;
        "null"  $scheme://$host;
    }

    server {
        listen 80;

        # Frontend - Serve React app
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # API
        location /api/ {
            proxy_pass http://deaware-backend:3000;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_redirect off;
        }

        # Keycloak
        location /auth/ {
            proxy_pass http://keycloak:8080/auth/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header Origin $fixed_origin;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Rewrite Keycloak internal redirects to use the client-facing URL
            proxy_redirect ~^http://[^/]+(/auth/.*)$ $scheme://$host$1;
            proxy_redirect ~^http://[^/]+(/realms/.*)$ $scheme://$host/auth$1;

            # Keycloak sends large headers (tokens, cookies)
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            # Rewrite all Keycloak cookie paths to / so browser always sends them
            proxy_cookie_path ~^/.+ /;
        }

        # SeaweedFS
        location /files/ {
            proxy_pass http://seaweed-filer:8888/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_redirect off;
        }


    }
}